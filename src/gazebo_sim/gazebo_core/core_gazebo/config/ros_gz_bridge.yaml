# ROS-Gazebo Bridge Configuration for Motor Testbench
# Topic definition: [ROS Topic] @ [ROS Message Type] [Bridge Direction] [Gazebo Message Type]

- topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- topic_name: "/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
